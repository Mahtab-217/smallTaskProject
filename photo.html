<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Unsplash Gallery</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 40px;
    }
    img {
      width: 600px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #0077ff;
      color: white;
    }
    button:hover {
      background-color: #005fcc;
    }
  </style>
  <script src="light.js" defer></script>
</head>
<body>
  <h1>My Advantures</h1>
  <img id="photo" src="https://media.istockphoto.com/id/904172104/photo/weve-made-it-all-this-way-i-am-proud.webp?a=1&b=1&s=612x612&w=0&k=20&c=XfRJBUkSatKmlfmpJo5di5ToQ9-cvnlRypQ03CHiylg=" alt="Unsplash Image">
  <br>
  <button onclick="changeImage()">Next Picture</button>

  <script>
    const images = [
      "https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=800&q=80",
      "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80",
      "https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTh8fGJlYXV0aWZ1bHxlbnwwfHwwfHx8MA%3D%3D",
    ];

    let index = 0;
   
    function changeImage() {
      index = (index + 1) % images.length; 
      document.getElementById("photo").src = images[index];
    }
  </script>
  <div>
    <div>
      <button></button>
    </div>
  </div>
  
</body>
</html>
